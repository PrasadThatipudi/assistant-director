services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: assistant
      POSTGRES_DB: assistant_director
    ports:
      - "5433:5432"
    volumes:
      - assistant_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant -d assistant_director"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  assistant_pg_data:
