# Render Blueprint: https://render.com/docs/blueprint-spec
# One-time: Render Dashboard → New → Blueprint → connect this repo.
# After first deploy: copy Deploy Hook URL → GitHub secret RENDER_DEPLOY_HOOK_URL.

databases:
  - name: assistant-director-db
    plan: free
    databaseName: assistant_director
    user: assistant

services:
  - type: web
    name: assistant-director-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    releaseCommand: alembic upgrade head
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: assistant-director-db
          property: connectionString
      - key: CORS_ALLOW_ORIGINS
        value: http://localhost:8081,http://127.0.0.1:8081,http://localhost:19006,http://127.0.0.1:19006
