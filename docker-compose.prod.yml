# Example staging stack: API container + Postgres.
# Copy to your server, set secrets via env file (not committed), then:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Override DATABASE_URL in .env.prod to point at the `postgres` service, e.g.:
#   postgresql+psycopg://assistant:CHANGE_ME@postgres:5432/assistant_director

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: assistant_director
    volumes:
      - prod_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant -d assistant_director"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ${API_IMAGE:?set API_IMAGE e.g. ghcr.io/org/assistant-director-api:main}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL for api container}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://your-site.netlify.app}
    ports:
      - "${API_PUBLISH_PORT:-8000}:8000"
    # Run migrations once before traffic (example one-off):
    # docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head

volumes:
  prod_pg_data:
